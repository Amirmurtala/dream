<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DreamMode Manufacturer</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
color:#222;
overflow-x:hidden;
}

.hidden{
display:none!important;
}

/* ======================
LOGIN
====================== */

.login-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
backdrop-filter:blur(6px);
}

.login-card{
background:#fff;
width:360px;
padding:40px;
border-radius:18px;
box-shadow:0 25px 60px rgba(0,0,0,.2);
text-align:center;
}

.login-card h1{
font-size:30px;
margin-bottom:8px;
color:#2563eb;
}

.login-card p{
margin-bottom:25px;
color:#666;
}

.login-card input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
font-size:15px;
margin-bottom:15px;
}

.login-card button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.login-card button:hover{
background:#1d4ed8;
}

.login-error{
display:none;
margin-top:15px;
color:#dc2626;
font-size:14px;
}

/* ======================
LOADING
====================== */

.loading{
position:fixed;
inset:0;
background:rgba(255,255,255,.75);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2000;
backdrop-filter:blur(5px);
}

.spinner{
width:55px;
height:55px;
border-radius:50%;
border:5px solid #ddd;
border-top:5px solid #2563eb;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* ======================
TOAST
====================== */

.toast{
position:fixed;
top:25px;
right:25px;
background:#111827;
color:#fff;
padding:15px 22px;
border-radius:12px;
opacity:0;
transform:translateY(-20px);
transition:.3s;
z-index:5000;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

/* ======================
LAYOUT
====================== */

#app{
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:#111827;
color:white;
padding:30px 25px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.brand h1{
font-size:28px;
margin-bottom:5px;
}

.brand p{
opacity:.75;
font-size:14px;
}

.sidebar nav{
margin-top:45px;
display:flex;
flex-direction:column;
gap:15px;
}

.sidebar nav a{
padding:14px 18px;
text-decoration:none;
color:white;
border-radius:12px;
transition:.3s;
}

.sidebar nav a:hover{
background:#1f2937;
}

.sidebar nav .active{
background:#2563eb;
}

.logout-btn{
margin-top:30px;
border:none;
background:#ef4444;
color:white;
padding:14px;
border-radius:12px;
cursor:pointer;
font-size:15px;
}

/* Main */

.content{
flex:1;
padding:40px;
}

/* Header */

.header{
margin-bottom:35px;
}

.header h1{
font-size:34px;
margin-bottom:8px;
}

.header p{
color:#666;
}

/* ======================
FORM
====================== */

.product-form-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
margin-bottom:40px;
}

.product-form-card h2{
margin-bottom:25px;
}

.image-upload{
margin-bottom:25px;
}

.image-upload label{
display:flex;
justify-content:center;
align-items:center;
height:240px;
border:2px dashed #cbd5e1;
border-radius:18px;
cursor:pointer;
overflow:hidden;
background:#f8fafc;
position:relative;
}

.image-upload input{
display:none;
}

#imagePreview{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

#uploadPlaceholder{
text-align:center;
color:#64748b;
}

#uploadPlaceholder p{
margin-top:12px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
textarea{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #dbe3ea;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus,
textarea:focus{
border-color:#2563eb;
}

textarea{
resize:vertical;
min-height:120px;
margin-bottom:25px;
}

.save-btn{
background:#2563eb;
color:white;
border:none;
padding:16px 35px;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.save-btn:hover{
background:#1d4ed8;
}

/* ======================
PRODUCT GRID
====================== */

.section-title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
gap:25px;
}

.product-card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}

.product-card:hover{
transform:translateY(-6px);
}

.product-card img{
width:100%;
height:220px;
object-fit:cover;
}

.product-info{
padding:18px;
}

.product-info h3{
margin-bottom:8px;
}

.product-info p{
font-size:14px;
color:#666;
margin-bottom:12px;
}

.price{
font-size:20px;
font-weight:700;
color:#2563eb;
margin-bottom:18px;
}

.actions{
display:flex;
gap:10px;
}

.actions button{
flex:1;
padding:11px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

.edit-btn{
background:#2563eb;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

/* ======================
RESPONSIVE
====================== */

@media(max-width:900px){

.sidebar{
width:85px;
padding:20px 10px;
}

.brand p,
.sidebar nav a{
font-size:0;
}

.brand h1{
font-size:20px;
}

.content{
padding:20px;
}

.form-grid{
grid-template-columns:1fr;
}

}

@media(max-width:700px){

#app{
flex-direction:column;
}

.sidebar{
width:100%;
flex-direction:row;
align-items:center;
padding:15px;
}

.sidebar nav{
flex-direction:row;
margin:0;
}

.logout-btn{
margin:0;
}

}

</style>

</head>

<body>

<!-- ===========================
LOGIN
=========================== -->

<div
id="loginModal"
class="login-modal">

<div class="login-card">

<h1>DreamMode</h1>

<p>

Manufacturer Login

</p>

<input
type="password"
id="adminPassword"
placeholder="Enter admin password">

<button
id="loginBtn">

Login

</button>

<p
id="loginError"
class="login-error">

Wrong password

</p>

</div>

</div>

<!-- ===========================
LOADING
=========================== -->

<div
id="loading"
class="loading hidden">

<div class="spinner"></div>

<p>

Loading...

</p>

</div>

<!-- ===========================
TOAST
=========================== -->

<div
id="toast"
class="toast">

</div>

<!-- ===========================
MAIN APP
=========================== -->

<div
id="app"
class="hidden">

<!-- Sidebar -->

<aside
class="sidebar">

<div class="brand">

<h1>
adminBoard

</h1>

<p>

Manufacturer

</p>

</div>

<nav>

<a
href="manufacturer_products.html"
class="active">

📦 Products

</a>

<a
href="manufacturer_orders.html">

🛒 Orders

</a>

</nav>

<button
id="logoutBtn"
class="logout-btn">

Logout

</button>

</aside>

<!-- Main -->

<main class="content">

<!-- ===========================
HEADER
=========================== -->

<header
class="header">

<div>

<h1>

Products

</h1>

<p>

Manage products in your shop

</p>

</div>

</header>

<!-- ===========================
PRODUCT FORM
=========================== -->

<section
class="product-form-card">

<h2>

Add Product

</h2>

<div
class="image-upload">

<label
for="productImage">

<img
id="imagePreview"
src=""
alt="">

<div
id="uploadPlaceholder">

📷

<p>

Click to upload image

</p>

</div>

</label>

<input
type="file"
id="productImage"
accept="image/*">

</div>

<div class="form-grid">

<div>

<label>

Product Name

</label>

<input
id="productName"
type="text"
placeholder="Gaming Mouse">

</div>

<div>

<label>

Price (₦)

</label>

<input
id="productPrice"
type="number"
placeholder="5000">

</div>

</div>

<label>

Description

</label>

<textarea
id="productDesc"
placeholder="Product description..."></textarea>

<input
type="hidden"
id="editingId">

<button
id="saveBtn"
class="save-btn">

Save Product

</button>

</section>

<!-- ===========================
PRODUCTS
=========================== -->

<section
class="products-section">

<div
class="section-title">

<h2>

Your Products

</h2>

<p
id="productCount">

0 Products

</p>

</div>

<div
id="productsGrid"
class="products-grid">

<!-- Products inserted here -->

</div>

</section>

</main>

</div>

<script>

/* ==========================================
   CONFIG
========================================== */

const API = "";

let adminPassword = "";

let selectedImage = "";

let editingId = "";

/* ==========================================
   ELEMENTS
========================================== */

const loginModal =
document.getElementById("loginModal");

const app =
document.getElementById("app");

const loading =
document.getElementById("loading");

const toast =
document.getElementById("toast");

const loginBtn =
document.getElementById("loginBtn");

const logoutBtn =
document.getElementById("logoutBtn");

const productName =
document.getElementById("productName");

const productPrice =
document.getElementById("productPrice");

const productDesc =
document.getElementById("productDesc");

const productImage =
document.getElementById("productImage");

const imagePreview =
document.getElementById("imagePreview");

const uploadPlaceholder =
document.getElementById("uploadPlaceholder");

const productsGrid =
document.getElementById("productsGrid");

const productCount =
document.getElementById("productCount");

const saveBtn =
document.getElementById("saveBtn");

/* ==========================================
   HELPERS
========================================== */

function showLoading(){

loading.classList.remove("hidden");

}

function hideLoading(){

loading.classList.add("hidden");

}

function showToast(message){

toast.innerText = message;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},2500);

}

/* ==========================================
   LOGIN
========================================== */

loginBtn.onclick = async()=>{

const password =
document
.getElementById("adminPassword")
.value
.trim();

if(!password){

showToast("Enter password");

return;

}

showLoading();

try{

const res =
await fetch(
API+"/api/admin/auth",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

password

})

});

const data =
await res.json();

hideLoading();

if(!data.ok){

document
.getElementById("loginError")
.style.display="block";

return;

}

adminPassword = password;

localStorage.setItem(

"adminPassword",

password

);

loginModal.style.display="none";

app.classList.remove("hidden");

loadProducts();

}

catch(err){

hideLoading();

showToast(err.message);

}

};

/* ==========================================
   AUTO LOGIN
========================================== */

window.addEventListener(

"load",

()=>{

const saved =

localStorage.getItem(

"adminPassword"

);

if(saved){

adminPassword = saved;

loginModal.style.display="none";

app.classList.remove("hidden");

loadProducts();

}

}

);

/* ==========================================
   IMAGE PREVIEW
========================================== */

productImage.onchange = ()=>{

const file =

productImage.files[0];

if(!file) return;

const reader =

new FileReader();

reader.onload = e=>{

selectedImage =

e.target.result;

imagePreview.src =

selectedImage;

imagePreview.style.display="block";

uploadPlaceholder.style.display="none";

};

reader.readAsDataURL(file);

};

/* ==========================================
   LOAD PRODUCTS
========================================== */

async function loadProducts(){

showLoading();

try{

const res =
await fetch(

API+"/api/products"

);

const data =
await res.json();

/* Compatible with
both response formats */

const products =

Array.isArray(data)

? data

: data.products || [];

renderProducts(products);

hideLoading();

}

catch(err){

hideLoading();

showToast(err.message);

}

}

/* ==========================================
   RENDER PRODUCTS
========================================== */

function renderProducts(products){

productsGrid.innerHTML="";

productCount.innerText=

products.length+

" Products";

if(products.length===0){

productsGrid.innerHTML=

`

<div style="grid-column:1/-1;text-align:center;padding:80px;color:#666;">

<h2>

📦

</h2>

<p>

No products available

</p>

</div>

`;

return;

}

products.forEach(product=>{

const card=

document.createElement("div");

card.className=

"product-card";

card.innerHTML=

`

<img src="${
product.img ||
'https://placehold.co/600x400?text=No+Image'
}">

<div class="product-info">

<h3>

${product.name}

</h3>

<p>

${product.desc}

</p>

<div class="price">

₦${Number(product.price).toLocaleString()}

</div>

<div class="actions">

<button

class="edit-btn"

onclick="editProduct('${product.id}')">

Edit

</button>

<button

class="delete-btn"

onclick="deleteProduct('${product.id}')">

Delete

</button>

</div>

</div>

`;

productsGrid.appendChild(card);

});

}
/* ==========================================
   SAVE PRODUCT
========================================== */

saveBtn.onclick = async () => {

    const name = productName.value.trim();
    const price = Number(productPrice.value);
    const desc = productDesc.value.trim();

    if (!name) {
        showToast("Enter product name");
        productName.focus();
        return;
    }

    if (!price || price <= 0) {
        showToast("Enter a valid price");
        productPrice.focus();
        return;
    }

    showLoading();

    try {

        const body = {

            password: adminPassword,

            id: editingId,

            name,

            price,

            desc,

            img: selectedImage

        };

        const res = await fetch(
            API + "/api/products/save",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            }
        );

        const data = await res.json();

        hideLoading();

        if (!data.ok) {

            showToast(data.error);

            return;

        }

        showToast(

            data.action === "updated"

            ? "Product Updated"

            : "Product Added"

        );

        clearForm();

        loadProducts();

    }

    catch (err) {

        hideLoading();

        showToast(err.message);

    }

};

/* ==========================================
   EDIT PRODUCT
========================================== */

async function editProduct(id){

    showLoading();

    try{

        const res =
        await fetch(
            API + "/api/products"
        );

        const data =
        await res.json();

        const products =

            Array.isArray(data)

            ? data

            : data.products || [];

        const product =

            products.find(

                p => p.id === id

            );

        hideLoading();

        if(!product){

            showToast(

                "Product not found"

            );

            return;

        }

        editingId = product.id;

        productName.value =

            product.name;

        productPrice.value =

            product.price;

        productDesc.value =

            product.desc;

        selectedImage =

            product.img;

        if(product.img){

            imagePreview.src =

                product.img;

            imagePreview.style.display =

                "block";

            uploadPlaceholder.style.display =

                "none";

        }

        saveBtn.innerText =

            "Update Product";

        window.scrollTo({

            top:0,

            behavior:"smooth"

        });

    }

    catch(err){

        hideLoading();

        showToast(

            err.message

        );

    }

}

/* ==========================================
   DELETE PRODUCT
========================================== */

async function deleteProduct(id){

    const ok = confirm(

        "Delete this product?"

    );

    if(!ok) return;

    showLoading();

    try{

        const res =

        await fetch(

            API +

            "/api/products/delete",

            {

                method:"POST",

                headers:{

                    "Content-Type":

                    "application/json"

                },

                body:JSON.stringify({

                    password:

                    adminPassword,

                    id

                })

            }

        );

        const data =

        await res.json();

        hideLoading();

        if(!data.ok){

            showToast(

                data.error

            );

            return;

        }

        showToast(

            "Product Deleted"

        );

        loadProducts();

    }

    catch(err){

        hideLoading();

        showToast(

            err.message

        );

    }

}

/* ==========================================
   CLEAR FORM
========================================== */

function clearForm(){

    editingId = "";

    selectedImage = "";

    productName.value = "";

    productPrice.value = "";

    productDesc.value = "";

    productImage.value = "";

    imagePreview.src = "";

    imagePreview.style.display =

        "none";

    uploadPlaceholder.style.display =

        "block";

    saveBtn.innerText =

        "Save Product";

}

/* ==========================================
   LOGOUT
========================================== */

logoutBtn.onclick = ()=>{

    const ok = confirm(

        "Logout?"

    );

    if(!ok) return;

    localStorage.removeItem(

        "adminPassword"

    );

    location.reload();

};

/* ==========================================
   ENTER KEY LOGIN
========================================== */

document

.getElementById(

"adminPassword"

)

.addEventListener(

"keydown",

e=>{

if(e.key==="Enter")

loginBtn.click();

}

);

/* ==========================================
   AUTO REFRESH
========================================== */

setInterval(()=>{

    if(

        !app.classList.contains(

            "hidden"

        )

    ){

        loadProducts();

    }

},30000);
</script>

</body>

</html>

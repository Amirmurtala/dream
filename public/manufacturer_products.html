<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f8fafc;color:#1e293b}

.container{max-width:700px;margin:0 auto;padding:20px}

.card{
  background:white;
  border-radius:16px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06)
}

h2{margin-bottom:10px}

input,textarea,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #e2e8f0;
  border-radius:10px;
}

button{
  background:#2563eb;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button.danger{background:#dc2626}

.grid{display:grid;gap:10px}

.product-item{
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px;
  border:1px solid #e2e8f0;
  border-radius:10px;
}

.product-item img{
  width:60px;height:60px;object-fit:cover;border-radius:8px;
}

.product-info{flex:1}
small{color:#64748b}
</style>
</head>

<body>
<div id="authModal" style="
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
">

  <div style="
  background:white;
  width:90%;
  max-width:420px;
  border-radius:20px;
  padding:30px;
  text-align:center;
  ">

    <h2>🔒 Manufacturer Login</h2>

    <p style="margin:10px 0;color:#64748b">
      Enter manufacturer password
    </p>

    <input
      id="manufacturerPassword"
      type="password"
      placeholder="Password"
    >

    <button
      id="loginBtn"
      onclick="manufacturerLogin()"
    >
      Login
    </button>

    <div id="authError"
      style="
      color:red;
      margin-top:10px;
      display:none;
      ">
      Wrong password
    </div>

  </div>

</div>
<div id="successPopup" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
z-index:10001;
align-items:center;
justify-content:center;
">

<div style="
background:white;
padding:35px;
border-radius:20px;
text-align:center;
">

<div style="font-size:60px">
✅
</div>

<h2>Login Successful</h2>

<p>
Loading dashboard...
</p>

</div>

</div>

<div class="container">

  <!-- ADD PRODUCT -->
  <div class="card">
    <h2>➕ Add Product</h2>

    <input id="pName" placeholder="Product name">
    <input id="pPrice" type="number" placeholder="Price">
    <textarea id="pDesc" placeholder="Description"></textarea>

    <input type="file" id="pImgFile">

    <button onclick="addProduct()">Save Product</button>
  </div>

  <!-- PRODUCTS -->
  <div class="card">
    <h2>📦 Products</h2>
    <div id="productList">Loading...</div>
  </div>

  <!-- ORDERS -->
  <div class="card">
    <h2>🧾 Orders</h2>
    <div id="orders">Loading...</div>
  </div>

</div>

<script>
const API =
'https://shopping-5f6c.onrender.com';

async function manufacturerLogin(){

  const password =
    document
      .getElementById(
        'manufacturerPassword'
      )
      .value
      .trim();

  if(!password){

    alert(
      'Enter password'
    );

    return;
  }

  const btn =
    document.getElementById(
      'loginBtn'
    );

  btn.disabled = true;
  btn.innerHTML =
    'Checking...';

  try{

    const res =
      await fetch(
        API + '/api/admin/auth',
        {
          method:'POST',
          headers:{
            'Content-Type':
            'application/json'
          },
          body:JSON.stringify({
            password
          })
        }
      );

    const data =
      await res.json();

    if(!data.ok){

      btn.disabled=false;
      btn.innerHTML='Login';

      document
        .getElementById(
          'authError'
        )
        .style.display='block';

      return;
    }

    sessionStorage.setItem(
      'manufacturer_auth',
      'true'
    );

    document
      .getElementById(
        'successPopup'
      )
      .style.display='flex';

    setTimeout(async()=>{

      document
        .getElementById(
          'authModal'
        )
        .style.display='none';

      document
        .getElementById(
          'successPopup'
        )
        .style.display='none';

      await loadProducts();
      await loadOrders();

    },1200);

  }catch(err){

    alert(
      'Server not connected'
    );

    console.error(err);

  }finally{

    btn.disabled=false;
    btn.innerHTML='Login';

  }

}
window.onload = async ()=>{

  const loggedIn =
    sessionStorage.getItem(
      'manufacturer_auth'
    );

  if(loggedIn === 'true'){

    document
      .getElementById(
        'authModal'
      )
      .style.display='none';

    await loadProducts();
    await loadOrders();

    return;
  }

  document
    .getElementById(
      'authModal'
    )
    .style.display='flex';

};

/* =======================
   API BASE (IMPORTANT FIX)
======================= */
const API = "https://shopping-5f6c.onrender.com";

/* =======================
   SAFE FETCH (NO CRASH)
======================= */
async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, options);
    const text = await res.text();

    try {
      return { ok: res.ok, data: JSON.parse(text) };
    } catch {
      console.error("Invalid JSON:", text);
      return { ok: false, data: [] };
    }

  } catch (err) {
    console.error("Network error:", err);
    return { ok: false, data: [] };
  }
}

/* =======================
   LOAD PRODUCTS
======================= */
async function loadProducts() {
  const res = await safeFetch(`${API}/api/products`);

  const products = res.data || [];

  document.getElementById("productList").innerHTML =
    products.length ? products.map(p => `
      <div class="product-item">
        <img src="${p.img || 'https://via.placeholder.com/60'}">
        <div class="product-info">
          <b>${p.name}</b>
          <small>₦${Number(p.price || 0).toLocaleString()}</small>
        </div>
        <button class="danger" onclick="deleteProduct('${p.id}')">X</button>
      </div>
    `).join("") : "<p>No products yet</p>";
}

/* =======================
   ADD PRODUCT
======================= */
async function addProduct(){

  const name =
    document.getElementById(
      'pName'
    ).value.trim();

  const price =
    document.getElementById(
      'pPrice'
    ).value.trim();

  const desc =
    document.getElementById(
      'pDesc'
    ).value.trim();

  if(!name || !price){
    alert(
      'Name and Price required'
    );
    return;
  }

  let img='';

  const file =
    document.getElementById(
      'pImgFile'
    ).files[0];

  if(file){

    img = await new Promise(
      resolve=>{

        const reader =
          new FileReader();

        reader.onload =
          e =>
            resolve(
              e.target.result
            );

        reader.readAsDataURL(
          file
        );
      }
    );
  }

  const res =
    await fetch(
      API +
      '/api/products/save',
      {
        method:'POST',
        headers:{
          'Content-Type':
          'application/json'
        },
        body:JSON.stringify({
          id:Date.now().toString(),
          name,
          price:Number(price),
          desc,
          img
        })
      }
    );

  const data =
    await res.json();

  if(!res.ok){

    alert(
      data.error ||
      'Save Failed'
    );

    return;
  }

  alert(
    'Product Saved'
  );

  loadProducts();
}
/* =======================
   DELETE PRODUCT
======================= */
async function deleteProduct(id) {
  await safeFetch(`${API}/api/products/delete`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id })
  });

  loadProducts();
}

/* =======================
   LOAD ORDERS
======================= */
async function loadOrders() {
  const res = await safeFetch(`${API}/api/orders`);

  const orders = res.data || [];

  document.getElementById("orders").innerHTML =
    orders.length ? orders.map(o => `
      <div class="product-item">
        <div class="product-info">
          <b>${o.customer}</b>
          <small>${o.phone}</small><br>
          <small>₦${Number(o.total || 0).toLocaleString()}</small><br>
          <small>Status: ${o.status}</small>
        </div>

        <button onclick="updateStatus('${o.id}')">
          Done
        </button>
      </div>
    `).join("") : "<p>No orders yet</p>";
}

/* =======================
   UPDATE ORDER STATUS
======================= */
async function updateStatus(id) {
  await safeFetch(`${API}/api/orders/update`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      id,
      status: "delivered"
    })
  });

  loadOrders();
}

function logout(){

  sessionStorage.removeItem(
    'manufacturer_auth'
  );

  location.reload();

}
/* =======================
   INIT
======================= */

</script>

</body>
</html>
